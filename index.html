<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SnowCade</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');

body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: black;
  color: white;
  overflow: hidden;
}

/* background */
.bg {
  position: fixed;
  inset: 0;
  background: url("snow.gif") center/cover no-repeat;
  filter: brightness(0.55);
  z-index: -2;
}

.overlay {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at top left, rgba(0,200,255,0.18), transparent 40%),
              radial-gradient(circle at bottom right, rgba(255,0,200,0.12), transparent 45%),
              rgba(0,0,0,0.6);
  z-index: -1;
}

/* layout */
.app {
  display: flex;
  height: 100vh;
}

/* sidebar */
.sidebar {
  width: 240px;
  padding: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(16px);
  border-right: 1px solid rgba(255,255,255,0.08);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.logo {
  font-size: 22px;
  font-weight: 800;
  margin-bottom: 20px;
}

/* nav items */
.nav {
  padding: 10px 12px;
  border-radius: 10px;
  cursor: pointer;
  color: rgba(255,255,255,0.7);
  transition: 0.2s;
}

.nav:hover {
  background: rgba(255,255,255,0.08);
  color: white;
  transform: translateX(4px);
}

.nav.active {
  background: rgba(0,200,255,0.15);
  color: white;
  border: 1px solid rgba(0,200,255,0.3);
}

/* main */
.main {
  flex: 1;
  padding: 30px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

.title {
  font-size: 26px;
  font-weight: 700;
}

/* pages */
.page {
  display: none;
  animation: fade 0.3s ease;
}

.page.active {
  display: block;
}

@keyframes fade {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* cards */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

.card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 18px;
  backdrop-filter: blur(12px);
  transition: 0.25s;
  cursor: pointer;
}

.card:hover {
  transform: translateY(-6px) scale(1.02);
  box-shadow: 0 20px 40px rgba(0,200,255,0.15);
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">❄️ SnowCade</div>

    <div class="nav active" onclick="switchPage('home')">🏠 Home</div>
    <div class="nav" onclick="switchPage('games')">🎮 Games</div>
    <div class="nav" onclick="switchPage('friends')">👥 Friends</div>
    <div class="nav" onclick="switchPage('chat')">💬 Chat</div>
    <div class="nav" onclick="switchPage('settings')">⚙️ Settings</div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="topbar">
      <div class="title" id="title">Home</div>
    </div>

    <!-- HOME -->
    <div class="page active" id="home">
      <div class="grid">
        <div class="card">🎮 Continue Playing</div>
        <div class="card">🔥 Featured Game</div>
        <div class="card">📊 Stats</div>
      </div>
    </div>

    <!-- GAMES -->
    <div class="page" id="games">
      <div class="grid">
        <div class="card">🐍 Snake</div>
        <div class="card">🧊 Clicker</div>
        <div class="card">🎯 Shooter</div>
      </div>
    </div>

    <!-- FRIENDS -->
    <div class="page" id="friends">
      <div class="card">👥 Friends system coming soon</div>
    </div>

    <!-- CHAT -->
    <div class="page" id="chat">
      <div class="card">💬 Chat system coming soon</div>
    </div>

    <!-- SETTINGS -->
    <div class="page" id="settings">
      <div class="card">⚙️ Settings coming soon</div>
    </div>

  </div>
</div>

<script>
function switchPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(page).classList.add('active');

  document.querySelectorAll('.nav').forEach(n => n.classList.remove('active'));
  event.target.classList.add('active');

  document.getElementById('title').innerText =
    page.charAt(0).toUpperCase() + page.slice(1);
}
</script>

</body>
</html>
